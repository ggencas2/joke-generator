<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joke Generator — by Gintaras</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    h1::before {
      content: '😂 ';
      -webkit-text-fill-color: initial;
    }

    button {
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #e94560, #f5a623);
      color: white;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(233, 69, 96, 0.6);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .joke-card {
      margin-top: 35px;
      min-height: 80px;
    }

    #setup {
      font-size: 1.15rem;
      line-height: 1.6;
      color: #c9d1d9;
      margin-bottom: 16px;
      font-style: italic;
    }

    #punchline {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.6;
      color: #f5a623;
      padding: 14px 20px;
      background: rgba(245, 166, 35, 0.08);
      border-left: 3px solid #f5a623;
      border-radius: 0 10px 10px 0;
      text-align: left;
    }

    #punchline:empty, #setup:empty {
      display: none;
    }

    #error {
      color: #e94560;
      font-size: 0.9rem;
      margin-top: 12px;
    }
    
    select {
      margin-top: 16px;
      padding: 10px 20px;
      font-size: 0.95rem;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      cursor: pointer;
      outline: none;
      width: 100%;
      max-width: 280px;
    }

    select option {
      background: #16213e;
      color: #e0e0e0;
    }

    #reset-btn {
      margin-left: 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #e0e0e0;
      box-shadow: none;
    }

    #reset-btn:hover {
      background: rgba(255,255,255,0.08);
      box-shadow: none;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Joke Generator</h1>
    <select id="category">
      <option value="Programming">Programming</option>
      <option value="Misc">Miscellaneous</option>
      <option value="Pun">Puns</option>
      <option value="Spooky">Spooky</option>
      <option value="Christmas">Christmas</option>
    </select>
    <button id="joke-btn">Get Joke</button>
    <button id="reset-btn">Reset</button>
    <div class="joke-card">
      <p id="setup"></p>
      <p id="punchline"></p>
      <p id="error"></p>
    </div>
    <select name="" id=""></select>
  </div>

  <script src="joke.js"></script>
</body>
</html>
